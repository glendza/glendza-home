---
- name: Install and configure fail2ban
  hosts: homeserver
  become: true

  vars:
    # Docker user configuration
    docker_user: "{{ username | default('milos') }}"
    docker_group: "{{ docker_user }}"
    docker_network: "glendza"

    # Log directory variables for fail2ban
    jellyfin_log_directory: "/var/log/jellyfin"
    filebrowser_log_directory: "/var/log/filebrowser"
    paperless_log_directory: "/var/log/paperless"
    glendza_log_directory: "/var/log/glendza"
    caddy_log_directory: "/var/log/caddy"

  roles:
    - role: fail2ban
      vars:
        fail2ban_services:
          sshd:
            enabled: true
            port: "ssh"
            filter: "sshd"
            logpath: "/var/log/auth.log"
            maxretry: 5
            custom_filter: false
            failregex: ""
            ignoreregex: ""

          jellyfin:
            enabled: true
            port: "http,https"
            filter: "jellyfin"
            logpath: "{{ jellyfin_log_directory }}/server.log"
            maxretry: 5
            custom_filter: true
            failregex: |-
              (?i)^.*Authentication request for .* has been denied \(IP: <HOST>\).*$
              (?i)^.*Authentication failed.*(?:from|IP[:= ]+)\s*<HOST>.*$
            ignoreregex: ""

          filebrowser:
            enabled: true
            port: "http,https"
            filter: "filebrowser"
            logpath: "{{ filebrowser_log_directory }}/filebrowser.log"
            maxretry: 5
            custom_filter: true
            failregex: |-
              (?i)^.*Authentication failed for user .* from <HOST>.*$
              (?i)^.*(?:Authentication failed|Invalid credentials|Login failed).*(?:from|ip[:= ]+)\s*<HOST>.*$
            ignoreregex: ""

          paperless:
            enabled: true
            port: "http,https"
            filter: "paperless"
            logpath: "{{ paperless_log_directory }}/paperless.log"
            maxretry: 5
            custom_filter: true
            failregex: |-
              (?i)^.*(?:Login failed|Authentication failed|Failed login).*(?:for user )?.*(?:from|ip[:= ]+)\s*<HOST>.*$
            ignoreregex: ""

          glendza:
            enabled: true
            port: "http,https"
            filter: "glendza"
            logpath: "{{ glendza_log_directory }}/*.log"
            maxretry: 5
            action: "iptables-multiport[name=glendza, port=\"http,https\", protocol=tcp, chain=DOCKER-USER]"
            custom_filter: true
            failregex: |-
              (?i)^.*(?:Authentication failed|Login failed|Invalid credentials).*(?:for user )?.*(?:from|ip[:= ]+)\s*<HOST>.*$
            ignoreregex: ""

          # Detects repeated 404 probes for common exploit/scanner paths
          # in Caddy access logs. Regex lines cover both console-style
          # (remote_ip=<HOST>) and JSON-style ("remote_ip":"<HOST>") entries.
          caddy_probe_404:
            enabled: true
            port: "http,https"
            filter: "caddy_probe_404"
            logpath: "{{ caddy_log_directory }}/access.log"
            maxretry: 8
            action: "iptables-multiport[name=caddy_probe_404, port=\"http,https\", protocol=tcp, chain=DOCKER-USER]"
            custom_filter: true
            failregex: |-
              (?i)^.*remote_ip=<HOST>.*(?:/wp-admin|/wp-login|/xmlrpc\.php|/\.env|/\.git|/phpmyadmin|/manager/html|/cgi-bin|/HNAP1|/boaform|/trace\.axd|/@vite/env|/\.vscode/sftp\.json|/ecp/Current/exporttool).*(?:status=404|"status":404).*$
              (?i)^.*remote_ip=<HOST>.*(?:status=404|"status":404).*(?:/wp-admin|/wp-login|/xmlrpc\.php|/\.env|/\.git|/phpmyadmin|/manager/html|/cgi-bin|/HNAP1|/boaform|/trace\.axd|/@vite/env|/\.vscode/sftp\.json|/ecp/Current/exporttool).*$
              (?i)^.*"remote_ip"\s*:\s*"<HOST>".*(?:/wp-admin|/wp-login|/xmlrpc\.php|/\.env|/\.git|/phpmyadmin|/manager/html|/cgi-bin|/HNAP1|/boaform|/trace\.axd|/@vite/env|/\.vscode/sftp\.json|/ecp/Current/exporttool).*(?:status=404|"status"\s*:\s*404).*$
              (?i)^.*"remote_ip"\s*:\s*"<HOST>".*(?:status=404|"status"\s*:\s*404).*(?:/wp-admin|/wp-login|/xmlrpc\.php|/\.env|/\.git|/phpmyadmin|/manager/html|/cgi-bin|/HNAP1|/boaform|/trace\.axd|/@vite/env|/\.vscode/sftp\.json|/ecp/Current/exporttool).*$
            ignoreregex: ""

          # Detects high-volume random URL spraying (often bot traffic).
          # Targets long alphanumeric URI slugs that typically return 301/404.
          caddy_random_path_spray:
            enabled: true
            port: "http,https"
            filter: "caddy_random_path_spray"
            logpath: "{{ caddy_log_directory }}/access.log"
            maxretry: 30
            action: "iptables-multiport[name=caddy_random_path_spray, port=\"http,https\", protocol=tcp, chain=DOCKER-USER]"
            custom_filter: true
            failregex: |-
              (?i)^.*remote_ip=<HOST>.*(?:uri=/[A-Za-z0-9]{12,}/?|request.*uri.?[:=].?/?[A-Za-z0-9]{12,}/?).*(?:status=301|status=404|"status"\s*:\s*(?:301|404)).*$
              (?i)^.*"remote_ip"\s*:\s*"<HOST>".*"uri"\s*:\s*"/[A-Za-z0-9]{12,}/?".*"status"\s*:\s*(?:301|404).*$
            ignoreregex: ""
